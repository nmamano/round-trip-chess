<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4f7942" />

    <title>Round-Trip Chess</title>
    <meta
      name="description"
      content="A two-board chess variant: capture the opponent's king on both boards to win. Free, no signup, play a friend by sharing a code."
    />

    <!-- Icons: PNG raster of the king art so every browser renders it identically
         (a Unicode-glyph <text> SVG favicon picks up the system font and varies). -->
    <link rel="icon" href="/favicon-48.png" sizes="48x48" type="image/png" />
    <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="/favicon-16.png" sizes="16x16" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph / social cards -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Round-Trip Chess" />
    <meta property="og:title" content="Round-Trip Chess" />
    <meta
      property="og:description"
      content="A two-board chess variant: capture the opponent's king on both boards to win."
    />
    <meta property="og:url" content="https://round-trip-chess.fly.dev/" />
    <meta property="og:image" content="https://round-trip-chess.fly.dev/og.png" />
    <meta property="og:image:width" content="2400" />
    <meta property="og:image:height" content="1260" />
    <meta property="og:image:alt" content="Round-Trip Chess, a two-board chess variant" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Round-Trip Chess" />
    <meta
      name="twitter:description"
      content="A two-board chess variant: capture the opponent's king on both boards to win."
    />
    <meta name="twitter:image" content="https://round-trip-chess.fly.dev/og.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Outfit:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
